  <!-- FILA BLANCA: LOGO + BUSCADOR + CARRITO -->
  <div class="mainbar">
    <div
      class="mainbar-inner"
      [ngClass]="{
        'navbar-operador': isOnlyOperador()
      }"
    >

      <!-- LOGO -->
      <a
        class="logo logo-link"
        routerLink="/"
        (click)="closeAllMenus()"
        aria-label="Ir al inicio"
      >
        <img class="logo-img" src="assets/sinfondo-guillerme.png" alt="Guillerme" />
      </a>

      <!-- BUSCADOR DESKTOP -->
      <div
        *ngIf="!isOnlyOperador()"
        class="nav-search nav-search--desktop"
        (click)="$event.stopPropagation()"
      >
        <app-header></app-header>
      </div>

      <!-- ACCIONES DERECHA: CARRITO + HAMBURGER MOBILE -->
      <div
        class="main-actions"
        *ngIf="!isAdminOrOperador()"
      >
        <button
          class="main-cart-btn"
          type="button"
          (click)="$event.stopPropagation(); openCart()"
          aria-label="Abrir carrito"
        >
          <span class="main-cart-count">{{ store.cartCount() }}</span>

          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M7 18a2 2 0 1 0 0 4 2 2 0 0 0 0-4zm10 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4zM6.2 6l.7 4h10.8l1.2-4H6.2zm-.4-2H21l-2.4 8H7.2l.4 2H19v2H6L3.8 4H1V2h4.4l.4 2z"/>
          </svg>
        </button>

        <button
          class="hamburger hamburger--spring"
          type="button"
          (click)="$event.stopPropagation(); toggleMenu()"
          aria-label="Abrir menú"
        >
          <span class="hamburger-box">
            <span class="hamburger-inner"></span>
          </span>
        </button>
      </div>

    </div>
  </div>

  <!-- BUSCADOR SOLO MOBILE -->
  <div class="mobileSearchBlock" *ngIf="!isOnlyOperador()">
    <app-header></app-header>
  </div>

  <!-- BARRA ROJA DE NAVEGACIÓN -->
  <div
    class="menu-items"
    [ngClass]="{ 'open': menuOpen() }"
  >
    <a
      *ngIf="!isOnlyOperador()"
      class="all all-colour"
      routerLink="/"
      (click)="closeMenu()"
    >
      Inicio
    </a>

    <!-- PRODUCTOS -->
    <div
      *ngIf="!isOnlyOperador()"
      class="nav-item dropdown"
      [class.open]="productsOpen()"
      (mouseenter)="openProductsMenu()"
      (mouseleave)="closeProductsMenu()"
    >
      <button
        type="button"
        class="all nav-link-btn"
        (click)="toggleProductsMenu($event)"
        aria-haspopup="true"
        [attr.aria-expanded]="productsOpen()"
      >
        Productos <span class="user-plus">▾</span>
      </button>

      <div class="dropdown-menu-custom">
        <button
          type="button"
          class="dropdown-item"
          (click)="goProducts('all')"
        >
          Todos los productos
        </button>

        <div class="dropdown-submenu-inline">
          <button
            type="button"
            class="dropdown-item dropdown-item-with-arrow"
            (click)="isDesktop() ? goProducts('libreria') : toggleLibraryMenu($event)"
          >
            <span>Librería</span>
            <span class="user-plus">
              {{ isDesktop() ? '▸' : (libraryOpen() ? '▾' : '▸') }}
            </span>
          </button>

          <!-- MOBILE -->
          <div
            class="dropdown-submenu-inline-menu"
            *ngIf="!isDesktop() && libraryOpen()"
          >
            <button type="button" class="dropdown-subitem" (click)="goProductsByBrand('Filgo')">Filgo</button>
            <button type="button" class="dropdown-subitem" (click)="goProductsByBrand('Skycolor')">Skycolor</button>
            <button type="button" class="dropdown-subitem" (click)="goProductsByBrand('Olami')">Olami</button>
            <button type="button" class="dropdown-subitem" (click)="goProductsByBrand('C-B-X')">C-B-X</button>
            <button type="button" class="dropdown-subitem" (click)="goProductsByBrand('FW')">FW</button>
            <button type="button" class="dropdown-subitem" (click)="goProductsByBrand('Keyroad')">Keyroad</button>
            <button type="button" class="dropdown-subitem" (click)="goProductsByBrand('Ibicraft')">Ibicraft</button>
            <button type="button" class="dropdown-subitem" (click)="goProductsByBrand('Wero')">Wero</button>
            <button type="button" class="dropdown-subitem" (click)="goProductsByBrand('Laprida-Exito')">Laprida-Exito</button>
            <button type="button" class="dropdown-subitem" (click)="goProductsByBrand('Bic')">Bic</button>
            <button type="button" class="dropdown-subitem" (click)="goProductsByBrand('Carpel')">Carpel</button>
            <button type="button" class="dropdown-subitem" (click)="goProductsByBrand('Otros')">Otros</button>
          </div>

          <!-- DESKTOP -->
          <div class="dropdown-submenu-menu" *ngIf="isDesktop()">
            <button type="button" class="dropdown-item" (click)="goProductsByBrand('Filgo')">Filgo</button>
            <button type="button" class="dropdown-item" (click)="goProductsByBrand('Skycolor')">Skycolor</button>
            <button type="button" class="dropdown-item" (click)="goProductsByBrand('Olami')">Olami</button>
            <button type="button" class="dropdown-item" (click)="goProductsByBrand('C-B-X')">C-B-X</button>
            <button type="button" class="dropdown-item" (click)="goProductsByBrand('FW')">FW</button>
            <button type="button" class="dropdown-item" (click)="goProductsByBrand('Keyroad')">Keyroad</button>
            <button type="button" class="dropdown-item" (click)="goProductsByBrand('Ibicraft')">Ibicraft</button>
            <button type="button" class="dropdown-item" (click)="goProductsByBrand('Wero')">Wero</button>
            <button type="button" class="dropdown-item" (click)="goProductsByBrand('Laprida-Exito')">Laprida-Exito</button>
            <button type="button" class="dropdown-item" (click)="goProductsByBrand('Bic')">Bic</button>
            <button type="button" class="dropdown-item" (click)="goProductsByBrand('Carpel')">Carpel</button>
            <button type="button" class="dropdown-item" (click)="goProductsByBrand('Otros')">Otros</button>
          </div>
        </div>

        <button
          type="button"
          class="dropdown-item"
          (click)="goProducts('combos')"
        >
          Combos
        </button>

        <button
          type="button"
          class="dropdown-item"
          (click)="goProducts('varios')"
        >
          Varios
        </button>
      </div>
    </div>

    <a
      *ngIf="!isOnlyOperador() && (!isAdmin() || !isDesktop())"
      class="all all-colour"
      routerLink="/contacto"
      (click)="closeMenu()"
    >
      Contacto
    </a>

    <!-- ADMINISTRAR -->
    <div
      *ngIf="isAdmin() && isDesktop()"
      class="nav-item dropdown"
      [class.open]="adminOpen()"
      (mouseenter)="openAdminMenu()"
      (mouseleave)="closeAdminMenu()"

      <button
        type="button"
        class="all nav-link-btn"
        (click)="toggleAdminMenu($event)"
        aria-haspopup="true"
        [attr.aria-expanded]="adminOpen()"
      >
        Administrar <span class="user-plus">▾</span>
      </button>

      <div class="dropdown-menu-custom">
        <button type="button" class="dropdown-item" (click)="goAdminHome()">Principal</button>
        <button type="button" class="dropdown-item" (click)="goAdminProducts()">Admin productos</button>
        <button type="button" class="dropdown-item" (click)="goOrders()">Pedidos WEB</button>
        <button type="button" class="dropdown-item" (click)="goLocalSales()">Ventas LOCAL</button>
      </div>
    </div>

    <a
      *ngIf="!isLogged()"
      class="all nav-login--mobile"
      routerLink="/login"
      (click)="closeMenu()"
    >
      Ingresar
    </a>
