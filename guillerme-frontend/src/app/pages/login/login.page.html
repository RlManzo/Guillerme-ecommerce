<div class="auth-page">
  <div class="auth-wrapper">
    <div class="auth-back">
      <a routerLink="/" class="back-link">
        <span class="back-arrow">←</span>
        Volver al inicio
      </a>
    </div>

    <div class="auth-card">
      <div class="auth-brand">
        <img src="assets/sinfondo-guillerme.png" alt="Guillerme" class="auth-logo" />
        <div>
          <h1 class="auth-title">Iniciar sesión</h1>
          <p class="auth-subtitle">Accedé a tu cuenta para continuar</p>
        </div>
      </div>

      <div class="alert alert-success mt-3" *ngIf="success()">
        {{ success() }}
      </div>

      <div class="alert alert-danger mt-3" *ngIf="error()">
        {{ error() }}
      </div>

      <form class="mt-3" (submit)="$event.preventDefault(); submit()">
        <div class="mb-3">
          <label class="form-label auth-label">Email</label>
          <input
            class="form-control auth-input"
            type="email"
            [ngModel]="email()"
            (ngModelChange)="email.set($event)"
            name="email"
            placeholder="admin@guillerme.com"
            required
          />
        </div>

        <div class="mb-3">
  <label class="form-label auth-label">Contraseña</label>

  <div class="pass-wrap">
    <input
      class="form-control auth-input"
      [type]="showPassword() ? 'text' : 'password'"
      [ngModel]="password()"
      (ngModelChange)="password.set($event)"
      name="password"
      placeholder="••••••••"
      required
      minlength="6"
    />

    <button
      type="button"
      class="pass-toggle"
      (click)="showPassword.set(!showPassword())"
      [attr.aria-label]="showPassword() ? 'Ocultar contraseña' : 'Mostrar contraseña'"
    >
      <ng-container *ngIf="!showPassword(); else eyeOff">
        <svg viewBox="0 0 24 24" class="eye-icon">
          <path
            d="M12 5C6 5 2 12 2 12s4 7 10 7 10-7 10-7-4-7-10-7zm0 12a5 5 0 1 1 0-10 5 5 0 0 1 0 10z"
            fill="currentColor"
          />
          <circle cx="12" cy="12" r="2.5" fill="currentColor" />
        </svg>
      </ng-container>

      <ng-template #eyeOff>
        <svg viewBox="0 0 24 24" class="eye-icon">
          <path
            d="M12 5C6 5 2 12 2 12a19.3 19.3 0 0 0 4.2 4.9L3 20l1.4 1.4 18-18L21 2l-2.8 2.8C16.5 3.9 14.4 3 12 3zM12 17a5 5 0 0 1-4.9-4.1l1.6-1.6A3 3 0 0 0 12 15a3 3 0 0 0 3-3c0-.4-.1-.8-.2-1.1l1.6-1.6A5 5 0 0 1 12 17z"
            fill="currentColor"
          />
        </svg>
      </ng-template>
    </button>
  </div>
</div>

        <div class="auth-row auth-row-end">
          <a class="auth-link small-link" [routerLink]="['/forgot-password']">
            ¿Olvidaste tu contraseña?
          </a>
        </div>

        <button class="auth-btn" type="submit" [disabled]="loading()">
          {{ loading() ? 'Ingresando...' : 'Ingresar' }}
        </button>

        <div class="auth-footer">
          <span>¿No tenés cuenta?</span>
          <a class="auth-link" [routerLink]="['/register']">Registrate</a>
        </div>
      </form>
    </div>
  </div>
</div>
