<div class="auth-page">
  <div class="auth-wrapper">
    <div class="auth-back">
      <a routerLink="/login" class="back-link">
        <span class="back-arrow">←</span>
        Volver al login
      </a>
    </div>

    <div class="auth-card">
      <div class="auth-brand">
        <img src="assets/sinfondo-guillerme.png" alt="Guillerme" class="auth-logo" />
        <div>
          <h1 class="auth-title">Nueva contraseña</h1>
          <p class="auth-subtitle">Ingresá tu nueva contraseña para continuar</p>
        </div>
      </div>

      <div class="alert alert-success mt-3" *ngIf="success()">
        {{ success() }}
      </div>

      <div class="alert alert-danger mt-3" *ngIf="error()">
        {{ error() }}

        <div class="mt-2">
          <a routerLink="/forgot-password" class="auth-link">
            Solicitar nuevo enlace
          </a>
        </div>
      </div>

      <form class="mt-3" (submit)="$event.preventDefault(); submit()">
        <div class="mb-3">
          <label class="form-label auth-label">Nueva contraseña</label>

          <div class="pass-wrap">
            <input
              class="form-control auth-input"
              [type]="showPassword() ? 'text' : 'password'"
              [ngClass]="{ 'is-invalid': showErr(vPassword()) }"
              [ngModel]="password()"
              (ngModelChange)="password.set($event)"
              name="password"
              placeholder="Mín. 8 caracteres, 1 mayúscula, 1 letra y 1 número"
              autocomplete="new-password"
            />

            <button
              type="button"
              class="pass-toggle"
              (click)="showPassword.set(!showPassword())"
              [attr.aria-label]="showPassword() ? 'Ocultar contraseña' : 'Mostrar contraseña'"
            >
              <ng-container *ngIf="!showPassword(); else eyeOff">
                <svg viewBox="0 0 24 24" class="eye-icon">
                  <path
                    d="M12 5C6 5 2 12 2 12s4 7 10 7 10-7 10-7-4-7-10-7zm0 12a5 5 0 1 1 0-10 5 5 0 0 1 0 10z"
                    fill="currentColor"
                  />
                  <circle cx="12" cy="12" r="2.5" fill="currentColor" />
                </svg>
              </ng-container>

              <ng-template #eyeOff>
                <svg viewBox="0 0 24 24" class="eye-icon">
                  <path
                    d="M12 5C6 5 2 12 2 12a19.3 19.3 0 0 0 4.2 4.9L3 20l1.4 1.4 18-18L21 2l-2.8 2.8C16.5 3.9 14.4 3 12 3zM12 17a5 5 0 0 1-4.9-4.1l1.6-1.6A3 3 0 0 0 12 15a3 3 0 0 0 3-3c0-.4-.1-.8-.2-1.1l1.6-1.6A5 5 0 0 1 12 17z"
                    fill="currentColor"
                  />
                </svg>
              </ng-template>
            </button>
          </div>

          <div class="invalid-feedback d-block" *ngIf="showErr(vPassword())">
            Debe tener 8+ caracteres, 1 mayúscula, 1 minúscula y 1 número.
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label auth-label">Confirmar nueva contraseña</label>

          <div class="pass-wrap">
            <input
              class="form-control auth-input"
              [type]="showConfirmPassword() ? 'text' : 'password'"
              [ngClass]="{ 'is-invalid': showErr(vConfirmPassword()) }"
              [ngModel]="confirmPassword()"
              (ngModelChange)="confirmPassword.set($event)"
              name="confirmPassword"
              autocomplete="new-password"
            />

            <button
              type="button"
              class="pass-toggle"
              (click)="showConfirmPassword.set(!showConfirmPassword())"
              [attr.aria-label]="showConfirmPassword() ? 'Ocultar contraseña' : 'Mostrar contraseña'"
            >
              <ng-container *ngIf="!showConfirmPassword(); else eyeOffConfirm">
                <svg viewBox="0 0 24 24" class="eye-icon">
                  <path
                    d="M12 5C6 5 2 12 2 12s4 7 10 7 10-7 10-7-4-7-10-7zm0 12a5 5 0 1 1 0-10 5 5 0 0 1 0 10z"
                    fill="currentColor"
                  />
                  <circle cx="12" cy="12" r="2.5" fill="currentColor" />
                </svg>
              </ng-container>

              <ng-template #eyeOffConfirm>
                <svg viewBox="0 0 24 24" class="eye-icon">
                  <path
                    d="M12 5C6 5 2 12 2 12a19.3 19.3 0 0 0 4.2 4.9L3 20l1.4 1.4 18-18L21 2l-2.8 2.8C16.5 3.9 14.4 3 12 3zM12 17a5 5 0 0 1-4.9-4.1l1.6-1.6A3 3 0 0 0 12 15a3 3 0 0 0 3-3c0-.4-.1-.8-.2-1.1l1.6-1.6A5 5 0 0 1 12 17z"
                    fill="currentColor"
                  />
                </svg>
              </ng-template>
            </button>
          </div>

          <div class="invalid-feedback d-block" *ngIf="showErr(vConfirmPassword())">
            Las contraseñas no coinciden.
          </div>
        </div>

        <button class="auth-btn" type="submit" [disabled]="loading()">
          {{ loading() ? 'Guardando...' : 'Guardar nueva contraseña' }}
        </button>
      </form>
    </div>
  </div>
</div>
