<div class="container py-4 orders-page" style="position: relative !important; top: 50px !important;">
  <div class="admin-header">
    <h1>Panel principal · Admin</h1>
  </div>

  <div *ngIf="error()" class="alert alert-danger mt-3">
    {{ error() }}
  </div>

  <div *ngIf="loading()" class="text-muted mt-3">
    Cargando...
  </div>

  <div class="row g-4 mt-1">
    <!-- PRODUCTOS -->
    <div class="col-12 col-lg-6">
      <div class="card h-100 shadow-sm">
        <div class="card-body d-flex flex-column justify-content-between">
          <div>
            <div class="small text-muted mb-2">Productos</div>
            <h3 class="mb-3">Productos activos</h3>

            <div class="display-6 fw-bold">
              {{ productsCount() }}
            </div>

            <div class="text-muted mt-2">
              Stock total disponible: <strong>{{ totalStock() }}</strong>
            </div>
          </div>

          <div class="mt-4">
            <button class="btn btn-warning btn-lg" type="button" (click)="goProducts()">
              Agregar productos
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- PEDIDOS -->
    <div class="col-12 col-lg-6">
      <div class="card h-100 shadow-sm">
        <div class="card-body d-flex flex-column justify-content-between">
          <div>
            <div class="small text-muted mb-2">Pedidos</div>
            <h3 class="mb-3">Pedidos nuevos</h3>

            <div class="display-6 fw-bold">
              {{ newOrdersCount() }}
            </div>

            <div class="text-muted mt-2">
              Pendientes de revisión inicial
            </div>
          </div>

          <div class="mt-4">
            <button class="btn btn-primary btn-lg" type="button" (click)="goOrders()">
              Ver pedidos
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- LISTADO RÁPIDO OPCIONAL -->
  <div class="card mt-4" *ngIf="newOrdersCount() > 0">
    <div class="card-header">
      Últimos pedidos nuevos
    </div>

    <div class="list-group list-group-flush">
      <button
        *ngFor="let o of newOrders().slice(0, 5)"
        type="button"
        class="list-group-item list-group-item-action d-flex justify-content-between align-items-center"
        (click)="goOrders()"
      >
        <div>
          <div class="fw-semibold">
            Pedido #{{ o.id }} · {{ o.customerEmail }}
          </div>
          <div class="small text-muted">
            {{ o.customerNombre }} {{ o.customerApellido }} · {{ o.totalItems }} items
          </div>
        </div>

        <span class="badge bg-secondary">
          {{ o.status }}
        </span>
      </button>
    </div>
  </div>
</div>
