<div class="auth-page">
  <div class="auth-wrapper">
    <div class="auth-back">
      <a routerLink="/login" class="back-link">
        <span class="back-arrow">←</span>
        Volver al login
      </a>
    </div>

    <div class="auth-card">
      <div class="auth-brand">
        <img src="assets/sinfondo-guillerme.png" alt="Guillerme" class="auth-logo" />
        <div>
          <h1 class="auth-title">Recuperar contraseña</h1>
          <p class="auth-subtitle">
            Ingresá tu email y te enviaremos un enlace para restablecerla
          </p>
        </div>
      </div>

      <div class="alert alert-success mt-3" *ngIf="success()">
        {{ success() }}
      </div>

      <div class="alert alert-danger mt-3" *ngIf="error()">
        {{ error() }}
      </div>

      <form class="mt-3" (submit)="$event.preventDefault(); submit()">
        <div class="mb-3">
          <label class="form-label auth-label">Email</label>
          <input
            class="form-control auth-input"
            type="email"
            [ngModel]="email()"
            (ngModelChange)="email.set($event)"
            name="email"
            placeholder="Ej: nombre@dominio.com"
            required
          />
        </div>

        <button class="auth-btn" type="submit" [disabled]="!canSubmit()">
        {{ buttonText() }}
        </button>
      </form>
    </div>
  </div>
</div>
